version: "3.9"

# ============================================================
#  docker-compose.yml
#  Ubuntu 22.04 Server with QEMU/KVM + Tailscale + sshx
# ============================================================

services:
  ubuntu-server:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ubuntu-nexus-server

    env_file:
      - .env

    ports:
      - "2222:22"
      - "16509:16509"

    # ── KVM — most portable approach ────────────────────────
    # device_cgroup_rules grants permission to mknod /dev/kvm inside
    # the container even when the host doesn't pass /dev/kvm through.
    # The entrypoint script tries 4 methods to create /dev/kvm.
    device_cgroup_rules:
      - 'c 10:* rwm'   # misc devices: /dev/kvm is major=10, minor=232
      - 'c 5:* rwm'    # /dev/net/tun (Tailscale)

    # Uncomment if /dev/kvm already exists on your host for best performance:
    # devices:
    #   - /dev/kvm:/dev/kvm
    #   - /dev/net/tun:/dev/net/tun

    privileged: true

    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - SYS_ADMIN
      - MKNOD

    security_opt:
      - seccomp:unconfined

    volumes:
      - tailscale-state:/var/lib/tailscale
      - kvm-images:/var/lib/libvirt/images

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "service", "ssh", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  tailscale-state:
  kvm-images:
